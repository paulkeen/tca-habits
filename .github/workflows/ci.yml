name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint, types, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: cd backend && uv sync --group dev
      - name: Ruff
        run: cd backend && uv run ruff check .
      - name: Mypy
        run: cd backend && uv run mypy main.py ai.py schemas.py models.py database.py
      - name: Pytest
        run: cd backend && uv run pytest tests -q

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: cd frontend && npm ci
      - name: Build
        run: cd frontend && npm run build
